# CareerOS CI — M0-T15 / T17 / T18 / T19
# Local equivalents (keep in sync with this workflow and with .pre-commit-config.yaml):
#   pnpm contracts:check
#   pnpm lint && pnpm lint:py
#   pnpm typecheck && pnpm typecheck:py
#   pnpm build
#   pnpm test && pnpm test:py
#   pnpm eval:gate
#   uv run pip-audit
#   pnpm audit --audit-level=high

name: CI

on:
  pull_request:
  push:
    branches: [master, main, CareerOS]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --frozen
      - run: pnpm contracts:check

  lint-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --frozen
      - run: pnpm lint
      - run: pnpm lint:py
      - run: pnpm typecheck
      - run: pnpm typecheck:py

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --frozen
      - run: pnpm build
      - run: uv build --all-packages

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --frozen
      - run: pnpm test
      - run: pnpm test:py

  eval-gate:
    name: Eval gate
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version
      - run: uv sync --frozen
      - run: uv run python evals/run_gate.py

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version-file: .python-version
      - run: pnpm install --frozen-lockfile
      - run: uv sync --all-packages --frozen
      - name: JS dependency audit
        run: pnpm audit --audit-level=high
      - name: Python dependency audit
        run: uv run pip-audit
