# CareerOS local environment (M0-T14).
# One command — `docker compose up` — brings up Postgres (pgvector), api, worker
# and web. Values default to local-dev-safe settings and can be overridden via a
# local .env (see .env.example and docs/environments.md). Production web runs on
# Vercel; it is included here for local parity.

name: careeros

x-careeros-app-env: &careeros-app-env
  CAREEROS_ENVIRONMENT: ${CAREEROS_ENVIRONMENT:-development}
  CAREEROS_LOG_LEVEL: ${CAREEROS_LOG_LEVEL:-INFO}
  CAREEROS_APP_NAME: ${CAREEROS_APP_NAME:-career-os}
  # In-cluster DNS: reach Postgres by its service name.
  CAREEROS_DATABASE_URL: postgresql://${POSTGRES_USER:-careeros}:${POSTGRES_PASSWORD:-careeros}@postgres:5432/${POSTGRES_DB:-careeros}
  # JWT issuer must match tokens from the local CLI (iss uses 127.0.0.1).
  # Asymmetric user tokens are verified via JWKS; from Docker that URL must
  # reach the host-published Supabase API (host.docker.internal on Desktop).
  CAREEROS_SUPABASE_URL: ${CAREEROS_SUPABASE_URL:-http://127.0.0.1:54321}
  CAREEROS_SUPABASE_JWKS_URL: ${CAREEROS_SUPABASE_JWKS_URL:-http://host.docker.internal:54321/auth/v1/.well-known/jwks.json}
  CAREEROS_SUPABASE_ANON_KEY: ${CAREEROS_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
  CAREEROS_SUPABASE_JWT_SECRET: ${CAREEROS_SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
  CAREEROS_SUPABASE_JWT_AUDIENCE: ${CAREEROS_SUPABASE_JWT_AUDIENCE:-authenticated}
  CAREEROS_OPPORTUNITY_BOARDS: ${CAREEROS_OPPORTUNITY_BOARDS:-greenhouse:stripe,greenhouse:gitlab}
  CAREEROS_INGESTION_INTERVAL_SECONDS: ${CAREEROS_INGESTION_INTERVAL_SECONDS:-3600}
  CAREEROS_MATCH_MIN_SCORE: ${CAREEROS_MATCH_MIN_SCORE:-0.55}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careeros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careeros}
      POSTGRES_DB: ${POSTGRES_DB:-careeros}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careeros} -d ${POSTGRES_DB:-careeros}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *careeros-app-env
      # Bind all interfaces inside the container (default is loopback-only).
      CAREEROS_API_HOST: 0.0.0.0
      CAREEROS_API_PORT: "8000"
    ports:
      - "${CAREEROS_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *careeros-app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
    init: true
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      # Browser calls API on the host-published port; server components in the
      # web container reach api via Docker DNS.
      CAREEROS_API_BASE_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
