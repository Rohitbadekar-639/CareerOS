# Alembic config for CareerOS application schema (M1).
# Run from repo root:
#   uv run alembic -c infra/migrations/alembic.ini upgrade head
#   uv run alembic -c infra/migrations/alembic.ini revision -m "message"
#
# Connection URL comes from CAREEROS_DATABASE_URL (see env.py). Do not put
# credentials in this file.

[alembic]
script_location = %(here)s
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = driver://unused

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
